<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot Controller</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <canvas id="liquid-canvas" class="liquid-background"></canvas>
    <div class="background-glow"></div>

    <div class="container">

        <header class="app-header">
            <button id="sidebar-toggle" class="icon-btn" title="Menu"><i class="fa-solid fa-bars"></i></button>
            <h1>🎵 Controller</h1>
            <div class="header-actions">
                <button id="refresh-btn" class="icon-btn" title="Atualizar">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <div class="status-pill" id="status-indicator">
                    <span class="dot"></span>
                    <span id="status-text">Desconectado</span>
                </div>
            </div>
        </header>

        <!-- Barra Lateral -->
        <aside id="settings-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>Ajustes</h3>
                <button id="close-sidebar" class="icon-btn"><i class="fa-solid fa-times"></i></button>
            </div>

            <div class="sidebar-content">
                <div class="setting-group">
                    <label>Token Discord</label>
                    <input type="password" id="token-input" placeholder="Cole o token...">
                    <button id="save-token-btn" class="btn-small">Salvar Token</button>
                </div>

                <div class="setting-group">
                    <label>Controle do Bot</label>
                    <div class="bot-control-buttons">
                        <button id="init-token-btn" class="btn-small" title="Inicializar">
                            <i class="fa-solid fa-power-off"></i> Iniciar
                        </button>
                        <button id="restart-bot-btn" class="btn-small" title="Reiniciar">
                            <i class="fa-solid fa-rotate-right"></i> Reiniciar
                        </button>
                        <button id="shutdown-bot-btn" class="btn-small danger" title="Desligar">
                            <i class="fa-solid fa-stop"></i> Desligar
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Overlay para barra lateral móvel -->
        <div id="sidebar-overlay" class="overlay"></div>

        <main class="bento-grid">

            <div class="card card-hero">
                <div class="album-wrapper">
                    <img id="album-art-img" src="/static/disc.png" alt="Album Art">
                    <div class="vinyl-hole"></div>
                </div>
                <div class="track-details">
                    <h2 id="song-title">Nenhuma música</h2>
                    <p id="song-artist">Aguardando comando...</p>

                    <!-- Barra de Progresso -->
                    <div class="progress-container" id="progress-container" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <div class="progress-time">
                            <span id="current-time">0:00</span>
                            <span id="total-time">0:00</span>
                        </div>
                    </div>

                    <div class="media-controls">
                        <button id="pause-resume-btn" class="btn-circle" title="Play/Pause">
                            <i class="fa-solid fa-play"></i> </button>
                        <button id="skip-btn" class="btn-circle secondary" title="Pular">
                            <i class="fa-solid fa-forward"></i>
                        </button>
                    </div>

                    <!-- Controle de Volume -->

                </div>
            </div>

            <div class="card card-input">
                <h3>Adicionar à Fila</h3>
                <div class="input-group">
                    <input type="text" id="music-input" placeholder="Cole o link ou nome..." autocomplete="off">
                    <button id="clear-search-btn" class="icon-btn" title="Limpar" style="display: none;"><i
                            class="fa-solid fa-times"></i></button>
                    <button id="play-btn"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>

            <div class="card card-queue">
                <div class="card-header">
                    <h3><i class="fa-solid fa-list-ol"></i> Fila</h3>
                    <span class="badge">Próximas</span>
                </div>
                <ul id="queue-list" class="custom-scrollbar">
                    <li class="queue-empty">A fila está vazia.</li>
                </ul>
            </div>

            <!-- Cartão de Playlist (Movido das Configurações) -->
            <div class="card card-playlist">
                <div class="card-header">
                    <h3><i class="fa-solid fa-list-check"></i> Playlists Salvas</h3>
                </div>

                <div class="setting-group">
                    <label>Upload Nova Playlist (.txt)</label>
                    <div class="file-drop-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>Arraste arquivo .txt</p>
                        <input type="file" id="playlist-upload" accept=".txt" hidden>
                    </div>
                </div>

                <div class="playlist-history-section">
                    <label>Minhas Playlists</label>
                    <ul id="playlist-history-list" class="simple-list">
                        <!-- Itens preenchidos via JS -->
                    </ul>
                </div>
            </div>

            <!-- Cartão de Rádios -->
            <div class="card card-radios">
                <div class="card-header">
                    <h3><i class="fa-solid fa-radio"></i> Rádios</h3>
                    <button id="add-radio-btn" class="btn-small">
                        <i class="fa-solid fa-plus"></i> Adicionar
                    </button>
                </div>

                <ul id="radios-list" class="simple-list custom-scrollbar">
                    <!-- Itens preenchidos via JS -->
                </ul>
            </div>

            <!-- Cartão de Soundboard -->
            <div class="card card-soundboard">
                <div class="card-header">
                    <h3><i class="fa-solid fa-volume-high"></i> Soundboard</h3>
                    <button id="upload-sfx-btn" class="btn-small">
                        <i class="fa-solid fa-upload"></i> Upload
                    </button>
                </div>

                <div id="soundboard-grid" class="soundboard-grid custom-scrollbar">
                    <!-- Preenchido via JS -->
                </div>
            </div>


        </main>
    </div>

    <!-- Modal para adicionar rádio -->
    <div id="radio-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-radio"></i> Adicionar Nova Rádio</h3>
                <button id="cancel-radio-btn" class="icon-btn">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <form id="radio-form">
                <div class="form-group">
                    <label for="radio-name">Nome da Rádio *</label>
                    <input type="text" id="radio-name" placeholder="Ex: Mix FM Brasil" required>
                </div>
                <div class="form-group">
                    <label for="radio-url">URL do Stream *</label>
                    <input type="url" id="radio-url" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label for="radio-location">Localização</label>
                    <input type="text" id="radio-location" placeholder="Ex: São Paulo, Brasil">
                </div>
                <div class="form-group">
                    <label for="radio-description">Descrição</label>
                    <textarea id="radio-description" placeholder="Descrição da rádio..." rows="3"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-small">
                        <i class="fa-solid fa-save"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para upload de SFX -->
    <div id="sfx-upload-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-upload"></i> Upload Sound Effect</h3>
                <button id="close-upload-modal" class="icon-btn">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <form id="sfx-upload-form">
                <div class="form-group">
                    <label for="sfx-file">Arquivo de Áudio (MP3, WAV, OGG, M4A)</label>
                    <input type="file" id="sfx-file" accept="audio/*" required>
                </div>
                <div id="audio-preview" class="audio-preview" style="display: none;">
                    <label>Preview:</label>
                    <audio id="preview-audio" controls></audio>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-small">
                        <i class="fa-solid fa-upload"></i> Upload
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="/static/js/main.js"></script>
</body>

</html>
