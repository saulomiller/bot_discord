

services:
  bot:
    container_name: discord-music-bot-instance
    # Usa a mesma imagem do serviço 'web'
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    # O comando para iniciar o bot e a API web.
    command: ["python3", "bot.py"]
    # Reiniciar o contêiner automaticamente se ele parar,
    # exceto quando for parado manualmente (ex: docker stop).
    # Isso garante que se o servidor cair, o bot tentará subir novamente.
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env # O token será lido daqui, preenchido pela UI
    volumes:
      # Mapeia a pasta de dados para persistência (token, playlists, radios)
      - ./data:/app/data