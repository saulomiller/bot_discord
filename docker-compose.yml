services:
  bot:
    container_name: discord-music-bot-instance
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: ["python3", "bot.py"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./static:/app/static

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
      net.ipv6.conf.default.disable_ipv6: 1

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    dns:
      - 9.9.9.9
      - 1.1.1.1