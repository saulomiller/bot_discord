services:
  bot:
    container_name: discord-music-bot-instance
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    command: ["python3", "bot.py"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    # Limita recursos para evitar que o bot consuma tudo do servidor
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    # Desabilita IPv6 no container — força pilha IPv4 pura
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 1
    # Logs com rotação para não encher o disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"